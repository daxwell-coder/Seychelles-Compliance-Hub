---
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-guard:
    name: Schema & Registry Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install root deps
        run: |
          if [ -f package.json ]; then npm ci; fi
      - name: Recompute schema & registry hashes
        run: node scripts/computeSchemaHashes.js
      - name: Fail if registry drift detected
        run: |
          if ! git diff --quiet -- docs/event_schema_registry.json; then
            echo "Registry hash drift detected. Run: node scripts/computeSchemaHashes.js and commit the result." >&2
            git --no-pager diff -- docs/event_schema_registry.json || true
            exit 1
          fi

  lint-build-test:
    name: Lint & Test (Node matrix)
    runs-on: ubuntu-latest
    needs: schema-guard
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install root deps
        run: |
          if [ -f package.json ]; then npm ci; fi
      - name: Lint (fail on warnings)
        run: npm run lint:ci
      - name: Install onboarding function deps
        working-directory: services/client-onboarding
        run: npm ci
      - name: Build onboarding function
        working-directory: services/client-onboarding
        run: npm run build
      - name: Run tests (coverage)
        working-directory: services/client-onboarding
        run: npm test -- --ci --coverage || true
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node }}
          path: services/client-onboarding/coverage

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: lint-build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: 1.7.5
      - name: Terraform Init (no backend)
        working-directory: terraform
        run: terraform init -backend=false
      - name: Terraform Fmt Check
        working-directory: terraform
        run: terraform fmt -check -recursive
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

